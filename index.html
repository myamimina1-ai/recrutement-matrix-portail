    function sauvegarderCandidat() {
        const q = qcmData[currentMetier];
        let score = 0;
        for (let i = 0; i < q.questions.length; i++) {
            if (qcmReponses[i] === q.questions[i].correct) score++;
        }
        const pourcentage = Math.round((score / q.questions.length) * 100);
        let messageIA = "";
        if (pourcentage >= q.seuil.bon) {
            messageIA = `Bravo ${currentNom} ! Vous êtes sur la bonne voie. (${pourcentage}%)`;
        } else if (pourcentage >= q.seuil.moyen) {
            messageIA = `Bonne progression, ${currentNom}. Des axes d'amélioration sont à travailler. (${pourcentage}%)`;

            messageIA = `Un accompagnement intense est recommandé pour ${currentNom}. (${pourcentage}%)`;
        }

            id: currentId, nom: currentNom, code: currentCode, metier: q.metier,

    function mettreAJourProgression() {
        const q = qcmData[currentMetier];
        let total = q.questions.length + extraQuestions.length;
        let repondu = 0;
        for (let i = 0; i < q.questions.length; i++) if (qcmReponses[i] !== undefined) repondu++;
        for (let i = 0; i < extraQuestions.length; i++) if (extraReponses[i] && extraReponses[i].trim() !== '') repondu++;
        let pourcentageProgression = Math.round((repondu / total) * 100);
        const fill = document.getElementById('progressFill');
        if (fill) fill.style.width = pourcentageProgression + '%';
        let msg = "";
        if (pourcentageProgression >= 75) {
            msg = `🎉 Bravo ${currentNom} ! Excellente progression, vous êtes sur la bonne voie. (${pourcentageProgression}%)`;
        } else if (pourcentageProgression >= 40) {
            msg = `📈 Bonne progression ${currentNom}, continuez comme ça ! (${pourcentageProgression}%)`;
        } else {
            msg = `⚠️ ${currentNom}, un accompagnement intense est recommandé. (${pourcentageProgression}%)`;
        }
        const msgDiv = document.getElementById('iaProgressMessage');
        if (msgDiv) msgDiv.innerHTML = msg;
    }

                return;
            }
            timeSeconds--;
            const mins = Math.floor(timeSeconds / 60);
            const secs = timeSeconds % 60;
            const timerDiv = document.getElementById('timerDisplay');
            if (timerDiv) timerDiv.innerHTML = `⏱️ ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }, 1000);
    }

            }
            for (let i = 0; i < extraQuestions.length; i++) {
                if (!extraReponses[i] || extraReponses[i].trim() === '') { alert(`Répondez à : ${extraQuestions[i].text}`); ok = false; break; }
            }
            if (ok) {
                const msg = sauvegarderCandidat();
                document.getElementById('feedbackMsg').innerHTML = `<div style="background:#d4edda; padding:0.8rem; border-radius:1rem;">✅ Merci ! ${msg}</div>`;
                document.getElementById('validerQCM').disabled = true;
                if (timerInterval) clearInterval(timerInterval);
            }
        });
        document.getElementById('fermerQCM').addEventListener('click', () => {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('qcmPanel').remove();
            if (authScreen) authScreen.style.display = 'block';
        });
        mettreAJourProgression();
    }

    function afficherEspaceRH() {
        const listeIds = JSON.parse(localStorage.getItem('liste_candidats') || '[]');
        const authScreen = document.getElementById('authScreen');
        if (authScreen) authScreen.style.display = 'none';
        const oldPanel = document.getElementById('rhPanel');
        if (oldPanel) oldPanel.remove();
        let html = `<div class="card" id="rhPanel"><div class="badge-zcmc">Interface RH</div><h1>📋 Tous les candidats</h1>
            <div class="flex"><button id="refreshRH">⟳ Actualiser</button><button id="exportAllCSV" style="background: #28a745;">📊 Exporter tous les résultats (CSV)</button></div>
            <div id="candidatsList" style="margin-top:1rem;">`;
        if (listeIds.length === 0) html += "<p>Aucun candidat pour le moment.</p>";
        else {
            for (let id of listeIds) {
                const data = JSON.parse(localStorage.getItem(`candidat_${id}`) || '{}');
                if (!data.nom) continue;
                const barreLargeur = data.pourcentage || 0;
                html += `<div class="candidat-item"><div><strong>${data.nom}</strong> - ${data.metier}<br>Score: ${data.score} (${data.pourcentage}%)<br>Sourcing: ${data.extraReponses ? data.extraReponses[3] : '?'}<br>
                    <div style="margin-top:0.5rem;"><div style="background:#e2e8f0; border-radius:1rem; height:8px;"><div style="background:linear-gradient(90deg,#f472b6,#a855f7); width:${barreLargeur}%; height:8px; border-radius:1rem;"></div></div>
                    <span style="font-size:0.8rem;">Progression: ${barreLargeur}%</span></div></div>
                    <div class="flex" style="margin-top:0.5rem;"><button class="btnDetail" data-id="${id}">📄 Détail QCM</button><button class="btnEval" data-id="${id}">📝 Grille RH</button><button class="btnExportPDF" data-id="${id}">📑 Export PDF</button><button class="btnDelete" data-id="${id}">🗑 Supprimer</button></div>
                    <div id="detail-${id}" class="detail-panel"></div><div id="eval-${id}" class="detail-panel" style="background:#e6f7ff;"></div>
                </div>`;
            }
        }
        html += `<button id="fermerRH" style="background:#6c757d; margin-top:1rem;">❌ Fermer</button></div>`;
        document.querySelector('.container').insertAdjacentHTML('beforeend', html);
        
        document.querySelectorAll('.btnDetail').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const data = JSON.parse(localStorage.getItem(`candidat_${id}`) || '{}');
                const metierKey = Object.keys(qcmData).find(k => qcmData[k].metier === data.metier);
                const q = qcmData[metierKey];
                let detail = `<strong>Réponses QCM :</strong><br>`;
                if (q && data.qcmReponses) {
                    q.questions.forEach((question, idx) => {
                        const reponse = data.qcmReponses[idx];
                        const estCorrect = reponse === question.correct;
                        detail += `${idx+1}. ${question.text}<br>→ ${question.options[reponse]} ${estCorrect ? '✅' : '❌'}<br><br>`;
                    });
                }
                detail += `<br><strong>Réponses complémentaires :</strong><br>`;
                extraQuestions.forEach((eq, idx) => {
                    detail += `<strong>${eq.text}</strong> → ${data.extraReponses ? data.extraReponses[idx] : '-'}<br>`;
                });
                detail += `<br><strong>Message IA :</strong> ${data.messageIA || ''}`;
                document.getElementById(`detail-${id}`).innerHTML = detail;
                document.getElementById(`detail-${id}`).style.display = 'block';
            });
        });
        
        document.querySelectorAll('.btnEval').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const data = JSON.parse(localStorage.getItem(`candidat_${id}`) || '{}');
                const evalData = data.evaluationRH || {};
                let evalHtml = `<h4>📋 Grille d'entretien RH</h4><table style="width:100%; border-collapse:collapse;"><tr style="background:#f0f0f0;"><th>Compétence</th><th>Note (1-5)</th><th>Commentaire</th></tr>`;
                competencesRH.forEach((comp, idx) => {
                    evalHtml += `<tr><td><strong>${comp.nom}</strong><br><small>${comp.question}</small></td>
                        <td><input type="number" class="note-${idx}" min="1" max="5" value="${evalData.notes ? evalData.notes[idx] || 3 : 3}" style="width:80px;"></td>
                        <td><input type="text" class="comm-${idx}" placeholder="Optionnel" value="${evalData.commentaires ? evalData.commentaires[idx] || '' : ''}" style="width:100%;"></td></tr>`;
                });
                evalHtml += `</table><label>Appréciation générale :</label><textarea id="evalGlobal" rows="2">${evalData.global || ''}</textarea>
                    <button id="saveEval-${id}" style="background:#28a745; margin-top:0.5rem;">💾 Sauvegarder mon évaluation</button>`;
                document.getElementById(`eval-${id}`).innerHTML = evalHtml;
                document.getElementById(`eval-${id}`).style.display = 'block';
                document.getElementById(`saveEval-${id}`).addEventListener('click', () => {
                    const notes = [], commentaires = [];
                    for (let i = 0; i < competencesRH.length; i++) {
                        notes.push(parseInt(document.querySelector(`.note-${i}`).value) || 3);
                        commentaires.push(document.querySelector(`.comm-${i}`).value);
                    }
                    const global = document.getElementById('evalGlobal').value;
                    data.evaluationRH = { notes, commentaires, global, date: new Date().toISOString() };
                    localStorage.setItem(`candidat_${id}`, JSON.stringify(data));
                    alert("Évaluation RH sauvegardée.");
                });
            });
        });
        
        document.querySelectorAll('.btnExportPDF').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const data = JSON.parse(localStorage.getItem(`candidat_${id}`) || '{}');
                const evalData = data.evaluationRH || {};
                let content = `<html><head><title>Rapport ${data.nom}</title><style>body{font-family:Arial;padding:2rem;} h1{color:#be185d;} .badge{background:#be185d;color:white;display:inline-block;padding:0.2rem 1rem;border-radius:20px;} table{border-collapse:collapse;width:100%;margin:1rem 0;} th,td{border:1px solid #ddd;padding:0.5rem;text-align:left;} th{background:#f0f0f0;}</style></head><body>
                    <div class="badge">ZCMC Recrutement Vision</div><h1>Rapport d'évaluation - ${data.nom}</h1>
                    <p><strong>Métier :</strong> ${data.metier}</p><p><strong>Date :</strong> ${new Date(data.date).toLocaleString()}</p>
                    <p><strong>Score QCM :</strong> ${data.score} (${data.pourcentage}%)</p><p><strong>Message IA :</strong> ${data.messageIA || ''}</p>
                    <h2>Réponses complémentaires</h2><ul>
                    <li><strong>Rôle chez ZCMC :</strong> ${data.extraReponses ? data.extraReponses[0] : '-'}</li>
                    <li><strong>Apport personnel :</strong> ${data.extraReponses ? data.extraReponses[1] : '-'}</li>
                    <li><strong>Pourquoi ZCMC :</strong> ${data.extraReponses ? data.extraReponses[2] : '-'}</li>
                    <li><strong>Sourcing :</strong> ${data.extraReponses ? data.extraReponses[3] : '-'}</li></ul>
                    <h2>Grille d'évaluation RH</h2><table><tr><th>Compétence</th><th>Note (1-5)</th><th>Commentaire</th></tr>
                    ${competencesRH.map((comp, idx) => `<tr><td>${comp.nom}</td><td>${evalData.notes ? evalData.notes[idx] : '-'}</td><td>${evalData.commentaires ? evalData.commentaires[idx] : '-'}</td></tr>`).join('')}
                    <tr><td colspan="3"><strong>Appréciation générale :</strong> ${evalData.global || '-'}</td></tr></table>
                    <p style="margin-top:2rem;">Document généré automatiquement par ZCMC Recrutement Vision</p></body></html>`;
                const blob = new Blob([content], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `rapport_${data.nom}.html`;
                a.click();
                URL.revokeObjectURL(url);
            });
        });
        
        document.querySelectorAll('.btnDelete').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                if (confirm("Supprimer définitivement ce candidat ?")) {
                    localStorage.removeItem(`candidat_${id}`);
                    let liste = JSON.parse(localStorage.getItem('liste_candidats') || '[]');
                    liste = liste.filter(i => i !== id);
                    localStorage.setItem('liste_candidats', JSON.stringify(liste));
                    afficherEspaceRH();
                }
            });
        });
        
        document.getElementById('exportAllCSV')?.addEventListener('click', () => {
            let csv = "Nom,Métier,Score,Pourcentage,Sourcing,Note Écoute,Note Articulation,Note Rigueur,Note Résilience,Note Culture,Note Mise en situation,Appréciation RH\n";
            for (let id of listeIds) {
                const data = JSON.parse(localStorage.getItem(`candidat_${id}`) || '{}');
                if (!data.nom) continue;
                const evalData = data.evaluationRH || {};
                csv += `"${data.nom}","${data.metier}","${data.score}","${data.pourcentage}","${data.extraReponses ? data.extraReponses[3] : ''}",`;
                csv += `${evalData.notes ? evalData.notes[0] || '' : ''},${evalData.notes ? evalData.notes[1] || '' : ''},${evalData.notes ? evalData.notes[2] || '' : ''},${evalData.notes ? evalData.notes[3] || '' : ''},${evalData.notes ? evalData.notes[4] || '' : ''},${evalData.notes ? evalData.notes[5] || '' : ''},"${evalData.global || ''}"\n`;
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tous_resultats_${new Date().toISOString().slice(0,19)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        });
        
        document.getElementById('refreshRH')?.addEventListener('click', () => afficherEspaceRH());
        document.getElementById('fermerRH')?.addEventListener('click', () => {
            document.getElementById('rhPanel').remove();
            if (authScreen) authScreen.style.display = 'block';
        });
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        const code = document.getElementById('accessCode').value.trim().toUpperCase();
        const nom = document.getElementById('candidateName').value.trim();
        if (!code || !nom) { alert("Code et nom requis."); return; }
        let metier = null;
        if (code.startsWith("CCZCMC")) metier = "CCZCMC";
        else if (code.startsWith("CMZCMC")) metier = "CMZCMC";
        else if (code.startsWith("GDZCMC")) metier = "GDZCMC";
        else { alert("Code invalide. Utilisez CCZCMC001, CMZCMC001 ou GDZCMC001."); return; }
        currentMetier = metier;
        currentNom = nom;
        currentCode = code;
        currentId = `${code}_${nom}`;
        if (localStorage.getItem(`candidat_${currentId}`)) { alert("Vous avez déjà répondu au QCM. Merci."); return; }
        qcmReponses = new Array(qcmData[currentMetier].questions.length).fill(undefined);
        extraReponses = new Array(extraQuestions.length).fill('');
        afficherQCM();
    });
    
    document.getElementById('rhLoginBtn').addEventListener('click', () => {
        const mdp = document.getElementById('rhPassword').value;
        if (mdp !== "RH2026") { alert("Mot de passe RH incorrect."); return; }
        afficherEspaceRH();
    });
})();
</script>
</body>
</html>
