    function sauvegarderCandidat() {
        let score = 0;
        for (let i = 0; i < qcmData[currentMetier].questions.length; i++) {
            if (qcmReponses[i] === qcmData[currentMetier].questions[i].correct) score++;
        }
        const pourcentage = Math.round((score / qcmData[currentMetier].questions.length) * 100);
        
        let messageMotivation = "";
        if (pourcentage >= 80) messageMotivation = `🎉 Félicitations ${currentNom} ! Tu es sur la bonne voie, ton profil est très prometteur pour rejoindre ZCMC. Continue comme ça ! 🎉`;
        else if (pourcentage >= 50) messageMotivation = `💪 ${currentNom}, tu as de bonnes bases ! Avec un peu de préparation, tu peux décrocher le poste. On croit en toi. 💪`;
        else messageMotivation = `🌱 ${currentNom}, ne lâche rien. Chaque erreur est une leçon. Prends le temps de te former et reviens encore plus fort. On t'attend. 🌱`;
        
        const data = {
            id: currentId,
            nom: currentNom,
            metier: qcmData[currentMetier].metier,
            date: new Date().toISOString(),
            qcmReponses: qcmReponses,
            extraReponses: extraReponses,
            evaluationRH: null,
            score: `${score}/${qcmData[currentMetier].questions.length}`,
            pourcentage: pourcentage,
            messageMotivation: messageMotivation,
            details: null

                question: qcmData[currentMetier].questions[i].text,

                bonneReponse: qcmData[currentMetier].questions[i].options[qcmData[currentMetier].questions[i].correct],
                estCorrect: qcmReponses[i] === qcmData[currentMetier].questions[i].correct
            });
        }
        data.details = details;
        
        localStorage.setItem(`candidat_${currentId}`, JSON.stringify(data));
        let all = JSON.parse(localStorage.getItem('liste_candidats') || '[]');
        if (!all.includes(currentId)) all.push(currentId);
        localStorage.setItem('liste_candidats', JSON.stringify(all));
        
        return { score, pourcentage, messageMotivation, details };
    }

                <div style="margin-bottom: 12px;">
                    <strong>${idx+1}. ${det.question}</strong><br>
                    <span style="color:${det.estCorrect ? '#10b981' : '#ef4444'}">Votre réponse : ${det.reponseDonnee}</span><br>
                    <span style="color:#8b5cf6">Bonne réponse : ${det.bonneReponse}</span>
                </div>
            `;
        });
        
        const contenuPDF = `
            <div style="padding: 30px; background: white; font-family: 'Segoe UI', Arial, sans-serif;">
                <h1 style="color: #a855f7; text-align: center;">🌸 ZCMC Recruitment Vision 🌸</h1>
                <h2 style="color: #ec4899; text-align: center;">Rapport d'évaluation</h2>
                <p><strong>Candidat :</strong> ${currentNom}</p>
                <p><strong>Métier :</strong> ${q.metier}</p>
                <p><strong>Date :</strong> ${new Date().toLocaleString()}</p>
                <p><strong>Score :</strong> ${resultat.score} / ${q.questions.length} (${resultat.pourcentage}%)</p>
                <div style="background: #fce7f3; border-left: 5px solid #ec4899; padding: 15px; margin: 20px 0;">
                    ${resultat.messageMotivation}
                </div>
                <h3 style="color: #a855f7;">📖 Détail des réponses :</h3>
                ${detailsHTML}
                <p style="margin-top: 30px; font-size: 12px; text-align: center; color: #6b21a5;">Document généré par ZCMC Recruitment Vision - Bravo pour ton parcours !</p>
            </div>
        `;
        
        const element = document.createElement("div");
        element.innerHTML = contenuPDF;
        document.body.appendChild(element);
        html2pdf().from(element).set({
            margin: 0.5,
            filename: `Evaluation_${currentNom.replace(/\s/g, '_')}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: "in", format: "a4", orientation: "portrait" }
        }).save().then(() => {
            document.body.removeChild(element);
        });
    }

    function aideIA(questionIndex, question, options, correctIndex) {
        const bonneReponse = options[correctIndex];
        const iaDiv = document.getElementById(`ia-${questionIndex}`);
        if (iaDiv) {
            iaDiv.innerHTML = `🤖 IA : La bonne réponse est "${bonneReponse}". Conseil : Relisez bien l'énoncé pour comprendre le contexte.`;
            iaDiv.style.display = "block";
            setTimeout(() => {
                iaDiv.style.display = "none";
            }, 5000);
        }
    }

    function afficherQCM() {
        const q = qcmData[currentMetier];
        let html = `<div class="card" id="qcmPanel">
            <div class="badge">${q.metier}</div>
            <h1>Bonjour ${currentNom}</h1>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>`;
        
        q.questions.forEach((question, idx) => {
            html += `<div class="question">
                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
                    <div class="question-text">${idx+1}. ${question.text}</div>
                    <button type="button" class="ia-btn" onclick="aideIA(${idx}, ${JSON.stringify(question.text).replace(/"/g, '&quot;')}, ${JSON.stringify(question.options).replace(/"/g, '&quot;')}, ${question.correct})">🤖 Aide IA</button>
                </div>
                <div class="options">
                    ${question.options.map((opt, optIdx) => `<label><input type="radio" name="q${idx}" value="${optIdx}" ${qcmReponses[idx] === optIdx ? 'checked' : ''}> ${opt}</label>`).join('')}
                </div>
                <div id="ia-${idx}" class="ia-reponse"></div>
            </div>`;
        });
        
        extraQuestions.forEach((eq, idx) => {
            if (eq.type === 'text') {
                html += `<div class="question">
                    <div class="question-text">${eq.text}</div>
                    <textarea id="extra_${idx}" rows="2" placeholder="Votre réponse...">${extraReponses[idx] || ''}</textarea>
                </div>`;
            } else if (eq.type === 'radio') {
                html += `<div class="question">
                    <div class="question-text">${eq.text}</div>
                    <div class="options">
                        ${eq.options.map(opt => `<label><input type="radio" name="extra_${idx}" value="${opt}" ${extraReponses[idx] === opt ? 'checked' : ''}> ${opt}</label>`).join('')}
                    </div>
                </div>`;
            }
        });
        
        html += `<button id="validerQCM">✅ Valider et voir mes résultats</button>
                 <div id="feedbackMsg" style="margin-top:1rem;"></div></div>`;
        
        document.getElementById('authScreen').style.display = 'none';
        const container = document.querySelector('.container');
        let existing = document.getElementById('qcmPanel');
        if (existing) existing.remove();
        container.insertAdjacentHTML('beforeend', html);
        
        for (let i = 0; i < q.questions.length; i++) {
            document.querySelectorAll(`input[name="q${i}"]`).forEach(radio => {
                radio.addEventListener('change', (e) => {
                    qcmReponses[i] = parseInt(e.target.value);
                    mettreAJourProgression();
                });
            });
        }
        for (let i = 0; i < extraQuestions.length; i++) {
            if (extraQuestions[i].type === 'text') {
                document.getElementById(`extra_${i}`).addEventListener('input', (e) => {
                    extraReponses[i] = e.target.value;
                    mettreAJourProgression();
                });
            } else if (extraQuestions[i].type === 'radio') {
                document.querySelectorAll(`input[name="extra_${i}"]`).forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        extraReponses[i] = e.target.value;
                        mettreAJourProgression();
                    });
                });
            }
        }
        
        document.getElementById('validerQCM').addEventListener('click', () => {
            let ok = true;
            for (let i = 0; i < q.questions.length; i++) {
                if (qcmReponses[i] === undefined) { alert(`Répondez à la question ${i+1}`); ok = false; break; }
            }
            for (let i = 0; i < extraQuestions.length; i++) {
                if (!extraReponses[i] || extraReponses[i].trim() === '') {
                    alert(`Répondez à : ${extraQuestions[i].text}`); ok = false; break;
                }
            }
            if (ok) {
                const resultat = sauvegarderCandidat();
                afficherResultats(resultat);
            }
        });
        
        mettreAJourProgression();
    }
    
    function mettreAJourProgression() {
        const q = qcmData[currentMetier];
        let total = q.questions.length + extraQuestions.length;
        let repondu = 0;
        for (let i = 0; i < q.questions.length; i++) if (qcmReponses[i] !== undefined) repondu++;
        for (let i = 0; i < extraQuestions.length; i++) if (extraReponses[i] && extraReponses[i].trim() !== '') repondu++;
        const percent = (repondu / total) * 100;
        const fill = document.getElementById('progressFill');
        if (fill) fill.style.width = percent + '%';
    }

    function afficherEspaceRH() {
        const listeIds = JSON.parse(localStorage.getItem('liste_candidats') || '[]');
        let html = `<div class="card" id="rhPanel">
            <div class="badge">Interface RH</div>
            <h1>📋 Tous les candidats</h1>
            <button id="refreshRH">⟳ Actualiser</button>
            <div id="candidatsList">`;
        
        if (listeIds.length === 0) {
            html += "<p>Aucun candidat pour le moment.</p>";
        } else {
            for (let id of listeIds) {
                const data = JSON.parse(localStorage.getItem(`candidat_${id}`) || '{}');
                if (!data.nom) continue;
                html += `<div class="candidat-item" data-id="${id}">
                    <div><strong>${data.nom}</strong> - ${data.metier}<br>Score: ${data.score} (${data.pourcentage}%)<br>Sourcing: ${data.extraReponses ? data.extraReponses[3] : '?'}</div>
                    <div class="flex">
                        <button class="btnDetail" data-id="${id}">📄 Détail QCM</button>
                        <button class="btnEval" data-id="${id}">📝 Grille RH</button>
                        <button class="btnDelete" data-id="${id}">🗑 Supprimer</button>
                    </div>
                    <div id="detail-${id}" class="detail-panel"></div>
                    <div id="eval-${id}" class="detail-panel" style="background:#e6f7ff;"></div>
                </div>`;
            }
        }
        html += `</div></div>`;
        
        document.getElementById('authScreen').style.display = 'none';
        const container = document.querySelector('.container');
        let existing = document.getElementById('rhPanel');
        if (existing) existing.remove();
        container.insertAdjacentHTML('beforeend', html);
        
        document.querySelectorAll('.btnDetail').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const data = JSON.parse(localStorage.getItem(`candidat_${id}`) || '{}');
                const metierKey = Object.keys(qcmData).find(k => qcmData[k].metier === data.metier);
                const q = qcmData[metierKey];
                let detail = `<strong>Réponses QCM :</strong><br>`;
                if (q && data.qcmReponses) {
                    q.questions.forEach((question, idx) => {
                        const reponse = data.qcmReponses[idx];
                        const estCorrect = reponse === question.correct;
                        detail += `${idx+1}. ${question.text} → ${question.options[reponse]} ${estCorrect ? '✅' : '❌'}<br>`;
                    });
                }
                detail += `<br><strong>Réponses complémentaires :</strong><br>`;
                extraQuestions.forEach((eq, idx) => {
                    detail += `<strong>${eq.text}</strong> → ${data.extraReponses ? data.extraReponses[idx] : '-'}<br>`;
                });
                document.getElementById(`detail-${id}`).innerHTML = detail;
                document.getElementById(`detail-${id}`).style.display = 'block';
            });
        });
        
        document.querySelectorAll('.btnEval').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const data = JSON.parse(localStorage.getItem(`candidat_${id}`) || '{}');
                const evalData = data.evaluationRH || {};
                
                let evalHtml = `<h4>📋 Grille d'entretien RH</h4>
                    <table style="width:100%; border-collapse:collapse;">
                        <tr style="background:#f0f0f0;"><th>Compétence</th><th>Questions à poser</th><th>Note (1-5)</th><th>Commentaire</th></tr>`;
                
                const competences = [
                    { nom: "Écoute active", question: "Décrivez une situation où vous avez calmé un client mécontent." },
                    { nom: "Articulation", question: "Expliquez-moi un processus complexe simplement." },
                    { nom: "Rigueur", question: "Comment organisez-vous vos priorités ?" },
                    { nom: "Résilience", question: "Que faites-vous si on critique votre travail ?" },
                    { nom: "Culture ZCMC", question: "Que savez-vous de notre activité médicale ?" }
                ];
                
                competences.forEach((comp, idx) => {
                    evalHtml += `<tr>
                        <td><strong>${comp.nom}</strong><br><small>${comp.question}</small></td>
                        <td><input type="number" class="note-${idx}" min="1" max="5" value="${evalData.notes ? evalData.notes[idx] || 3 : 3}" style="width:70px;"></td>
                        <td><input type="text" class="comm-${idx}" placeholder="Optionnel" value="${evalData.commentaires ? evalData.commentaires[idx] || '' : ''}" style="width:100%;"></td>
                    </tr>`;
                });
                
                evalHtml += `<tr>
                    <label>Appréciation générale :</label><textarea id="evalGlobal" rows="2">${evalData.global || ''}</textarea>
                    <button id="saveEval-${id}">💾 Sauvegarder mon évaluation</button>`;
                
                document.getElementById(`eval-${id}`).innerHTML = evalHtml;
                document.getElementById(`eval-${id}`).style.display = 'block';
                
                document.getElementById(`saveEval-${id}`).addEventListener('click', () => {
                    const notes = [];
                    const commentaires = [];
                    for (let i = 0; i < competences.length; i++) {
                        notes.push(parseInt(document.querySelector(`.note-${i}`).value) || 3);
                        commentaires.push(document.querySelector(`.comm-${i}`).value);
                    }
                    const global = document.getElementById('evalGlobal').value;
                    data.evaluationRH = { notes, commentaires, global, date: new Date().toISOString() };
                    localStorage.setItem(`candidat_${id}`, JSON.stringify(data));
                    alert("Évaluation RH sauvegardée.");
                });
            });
        });
        
        document.querySelectorAll('.btnDelete').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                if (confirm("Supprimer définitivement ce candidat ?")) {
                    localStorage.removeItem(`candidat_${id}`);
                    let liste = JSON.parse(localStorage.getItem('liste_candidats') || '[]');
                    liste = liste.filter(i => i !== id);
                    localStorage.setItem('liste_candidats', JSON.stringify(liste));
                    afficherEspaceRH();
                }
            });
        });
        
        document.getElementById('refreshRH')?.addEventListener('click', () => afficherEspaceRH());
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        const code = document.getElementById('accessCode').value.trim().toUpperCase();
        const nom = document.getElementById('candidateName').value.trim();
        if (!code || !nom) { alert("Code et nom requis."); return; }
        
        let metier = null;
        if (code.startsWith("CCZCMC")) metier = "CCZCMC";
        else if (code.startsWith("CMZCMC")) metier = "CMZCMC";
        else if (code.startsWith("GDZCMC")) metier = "GDZCMC";
        else { alert("Code invalide. Utilisez CCZCMC001, CMZCMC001 ou GDZCMC001."); return; }
        
        currentMetier = metier;
        currentNom = nom;
        currentId = `${code}_${nom}`;
        
        const existing = localStorage.getItem(`candidat_${currentId}`);
        if (existing) { alert("Vous avez déjà répondu au QCM. Merci."); return; }
        
        qcmReponses = [];
        extraReponses = [];
        afficherQCM();
    });
    
    document.getElementById('rhLoginBtn').addEventListener('click', () => {
        const mdp = document.getElementById('rhPassword').value;
        if (mdp !== "RH2026") { alert("Mot de passe RH incorrect."); return; }
        afficherEspaceRH();
    });
</script>

</body>
</html>
