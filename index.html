<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZCMC Recrutement Vision ULTRA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* ================= DESIGN ================= */

body{
background: linear-gradient(145deg,#fdf2f8,#f3e8ff);
font-family:'Segoe UI',sans-serif;
padding:20px;
}

.container{max-width:1000px;margin:auto;}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-bottom:20px;
}

button{
background:linear-gradient(95deg,#be185d,#7c3aed);
color:white;
border:none;
padding:10px 15px;
border-radius:30px;
cursor:pointer;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ddd;
}

/* TIMER */
.timer{
font-size:18px;
font-weight:bold;
color:#be185d;
margin-bottom:10px;
}

/* ================= VARIABLES ================= */

</style>

<script>

// 🔴 REMPLACE ICI
const API = "https://TON-REPLIT-URL";

let currentNom="";
let currentId="";
let qcmReponses=[];
let temps=1800; // 30 min

/* ================= IA ================= */

function aideIA(index,question,options,correct){
const div=document.getElementById("ia-"+index);
div.innerHTML="🤖 "+options[correct];
div.style.display="block";
setTimeout(()=>div.style.display="none",4000);
}

/* ================= LOGIN ================= */

function login(){
const nom=document.getElementById("nom").value;

if(!nom) return alert("Nom requis");

currentNom=nom;
currentId=Date.now()+"_"+nom;

afficherQCM();
startTimer();
}

/* ================= TIMER ================= */

function startTimer(){
const interval=setInterval(()=>{
temps--;

let min=Math.floor(temps/60);
let sec=temps%60;

document.getElementById("timer").innerText=
"⏱ "+min+":"+ (sec<10?"0"+sec:sec);

if(temps<=0){
clearInterval(interval);
valider();
alert("Temps écoulé");
}

},1000);
}

/* ================= QUESTIONS ================= */

const questions=[
{text:"KPI ?",options:["Indicateur clé","Erreur"],correct:0},
{text:"Client en colère ?",options:["Couper","Écouter"],correct:1},
{text:"CRM ?",options:["Gestion client","Erreur"],correct:0}
];

/* ================= QCM ================= */

function afficherQCM(){

let html=`<div class="card">

<div id="timer" class="timer"></div>

<h2>Bonjour ${currentNom}</h2>
`;

questions.forEach((q,i)=>{
html+=`
<div>
${i+1}. ${q.text}

<button onclick="aideIA(${i},'${q.text}',${JSON.stringify(q.options)},${q.correct})">🤖</button>

${q.options.map((o,j)=>`
<label><input type="radio" name="q${i}" value="${j}">${o}</label>
`).join("")}

<div id="ia-${i}" style="display:none;"></div>

</div>
`;
});

html+=`<button onclick="valider()">Valider</button></div>`;

document.querySelector(".container").innerHTML=html;
}

/* ================= SAVE ================= */

function valider(){

questions.forEach((q,i)=>{
const val=document.querySelector(`input[name="q${i}"]:checked`);
qcmReponses[i]=val?parseInt(val.value):null;
});

let score=0;
questions.forEach((q,i)=>{
if(qcmReponses[i]===q.correct) score++;
});

const data={
id:currentId,
nom:currentNom,
score:score,
total:questions.length,
date:new Date()
};

fetch(API+"/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

afficherResultat(score);
}

/* ================= RESULT ================= */

function afficherResultat(score){

let html=`
<div class="card">
<h2>Résultat</h2>
<p>${currentNom} : ${score}/${questions.length}</p>

<button onclick="location.reload()">Retour</button>
</div>
`;

document.querySelector(".container").innerHTML=html;
}

/* ================= RH ================= */

function loginRH(){

const mdp=document.getElementById("rh").value;
if(mdp!=="RH2026") return alert("Erreur");

chargerRH();
}

function chargerRH(){

fetch(API+"/candidats")
.then(r=>r.json())
.then(data=>afficherRH(data));
}

function afficherRH(list){

let total=list.length;
let moyenne=0;

list.forEach(c=>moyenne+=c.score);
moyenne= total?Math.round(moyenne/total):0;

let html=`
<div class="card">
<h2>Dashboard RH</h2>
<p>Total candidats : ${total}</p>
<p>Moyenne : ${moyenne}</p>
<button onclick="chargerRH()">🔄 Refresh</button>
</div>
`;

list.forEach(c=>{
html+=`
<div class="card">
${c.nom} - ${c.score}/${c.total}
<button onclick="supprimer('${c.id}')">🗑</button>
</div>
`;
});

document.querySelector(".container").innerHTML=html;
}

function supprimer(id){
fetch(API+"/delete/"+id,{method:"DELETE"})
.then(()=>chargerRH());
}

</script>
</head>

<body>

<div class="container">

<div class="card">

<h2>Connexion candidat</h2>
<input id="nom" placeholder="Nom">
<button onclick="login()">Commencer</button>

<hr>

<h2>Espace RH</h2>
<input id="rh" placeholder="Mot de passe">
<button onclick="loginRH()">Accéder</button>

</div>

</div>

</body>
</html>
